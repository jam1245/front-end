<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Program Guardian - AI Agent Team Demo</title>
  <meta name="description" content="Program Guardian - AI Agent Team for Defense Program Management. 9 AI agents with human-in-the-loop architecture.">
  <style>
    /* System font stack only — no external font CDN (works on restricted networks). */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
    #root { width: 100%; height: 100vh; }
    #loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #EAF1FB; flex-direction: column; gap: 20px; z-index: 9999;
    }
    #loading-text { font-size: 18px; color: #2563EB; font-weight: 600; letter-spacing: 0.1em; }
    .spinner {
      width: 50px; height: 50px;
      border: 4px solid #E8F0FA; border-top-color: #2563EB;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div id="loading-text">LOADING PROGRAM GUARDIAN...</div>
    <div id="loading-subtext" style="font-size: 11px; color: #64748B; margin-top: 10px; letter-spacing: 0.05em;">Starting application...</div>
  </div>
  <div id="root"></div>

  <!-- All dependencies are vendored locally (relative paths) so nothing is
       fetched from the internet. Order matters: React + PropTypes before
       Recharts; everything before the precompiled app. -->
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <script src="vendor/prop-types.min.js"></script>
  <script src="vendor/Recharts.js"></script>

  <!-- Precompiled application (no runtime Babel needed). Build with build.py. -->
  <script src="app.compiled.js"></script>

  <!-- Safety net: surface an error if the app never mounts. -->
  <script>
    setTimeout(function () {
      var root = document.getElementById('root');
      if (!root || root.children.length === 0) {
        var lt = document.getElementById('loading-text');
        var st = document.getElementById('loading-subtext');
        if (lt) { lt.textContent = 'Loading failed - please refresh'; lt.style.color = '#EF4444'; }
        if (st) { st.textContent = 'Check the browser console (F12) for errors'; }
      }
    }, 15000);
  </script>
</body>
</html>
