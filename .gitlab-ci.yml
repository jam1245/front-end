pages:
  stage: deploy
  script:
    - echo "Deploying self-contained Program Guardian to GitLab Pages..."
    - mkdir -p public
    # Fully self-contained: no external CDN/font dependencies (works behind
    # restricted/internal networks). All assets are committed in the repo.
    - cp index.html public/index.html
    - cp app.compiled.js public/app.compiled.js
    - cp -r vendor public/vendor
    - echo "Deployment complete."
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
